<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>ViewRig Orbit Playground</title>
    <link rel="stylesheet" href="./src/styles.css">
  </head>
  <body>
    <main class="app">
      <section class="viewport" aria-label="Orbit camera playground">
        <canvas id="view" width="960" height="540"></canvas>
      </section>
      <aside class="panel">
        <label>
          Yaw
          <input id="yaw" type="range" min="-180" max="180" value="45">
        </label>
        <label>
          Pitch
          <input id="pitch" type="range" min="-45" max="75" value="20">
        </label>
        <label>
          Distance
          <input id="distance" type="range" min="2" max="10" value="5" step="0.1">
        </label>
        <pre id="pose"></pre>
      </aside>
    </main>
    <script type="module" src="./src/main.js"></script>
  </body>
</html>
