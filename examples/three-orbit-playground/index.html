<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>ViewRig Camera Playground</title>
    <link rel="stylesheet" href="./src/styles.css">
  </head>
  <body>
    <main class="app">
      <section class="viewport" aria-label="ViewRig camera playground">
        <canvas id="view" width="960" height="540"></canvas>
      </section>
      <aside class="panel">
        <label>
          Mode
          <select id="mode">
            <option value="thirdPerson">Third Person</option>
            <option value="orbit">Orbit</option>
            <option value="follow">Follow</option>
            <option value="firstPerson">First Person</option>
            <option value="railShot">Rail Shot</option>
          </select>
        </label>
        <label>
          Yaw
          <input id="yaw" type="range" min="-180" max="180" value="45">
        </label>
        <label>
          Pitch
          <input id="pitch" type="range" min="-45" max="75" value="20">
        </label>
        <label>
          Distance
          <input id="distance" type="range" min="2" max="10" value="5" step="0.1">
        </label>
        <label>
          Shoulder
          <input id="shoulder" type="range" min="-1" max="1" value="1" step="0.1">
        </label>
        <label>
          Target / Rail T
          <input id="railT" type="range" min="0" max="1" value="0.35" step="0.01">
        </label>
        <label>
          Rail Driver
          <select id="railDriver">
            <option value="input">Input Scrub</option>
            <option value="time">Time Driver</option>
          </select>
        </label>
        <label>
          Duration
          <input id="duration" type="range" min="1" max="8" value="4" step="0.25">
        </label>
        <label>
          Damping
          <input id="damping" type="range" min="0" max="0.5" value="0.12" step="0.01">
        </label>
        <label>
          Composer
          <select id="composer">
            <option value="center">Center</option>
            <option value="lookAhead">Look Ahead</option>
            <option value="wide">Wide</option>
          </select>
        </label>
        <label class="toggle">
          <input id="debugOverlay" type="checkbox" checked>
          Debug overlay
        </label>
        <output id="modeState"></output>
        <output id="debugState"></output>
        <pre id="pose"></pre>
      </aside>
    </main>
    <script type="module" src="./src/main.js"></script>
  </body>
</html>
